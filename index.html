<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metalist</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  </head>
  <body>
    <div class="wrapper">
      <main class="main">
        <section class="history">
          <h2 style="text-align: center">Стисла історія стадіону</h2>
          <div class="swiper history-swiper">
            <div class="swiper-wrapper history-wrapper">
              <!-- <div class="swiper-slide">Slide 1</div>
              <div class="swiper-slide">Slide 2</div>
              <div class="swiper-slide">Slide 3</div> -->
            </div>
            <div class="swiper-pagination"></div>

            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>

            <div class="swiper-scrollbar"></div>
          </div>
        </section>
        <section class="facts">
          <h2 style="text-align: center">Цікаві факти</h2>

          <div class="swiper facts-swiper">
            <div class="swiper-wrapper facts-wrapper"></div>
            <div class="swiper-pagination"></div>

            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>

            <div class="swiper-scrollbar"></div>
          </div>
        </section>
        <section class="players">
          <h2 style="text-align: center">Легенди команди</h2>

          <div class="swiper players-swiper">
            <div class="swiper-wrapper players-wrapper"></div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
